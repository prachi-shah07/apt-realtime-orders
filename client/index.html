<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APT — Real-Time Order Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface2:  #16161f;
      --border:    #1e1e2e;
      --accent:    #00e5a0;
      --accent-dim:#00e5a022;
      --text:      #e2e2e8;
      --text-muted:#6b6b80;
      --yellow:    #f0c040;
      --blue:      #40a0f0;
      --red:       #f05060;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      font-size: 14px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span { color: var(--text-muted); }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ws-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }

    .dot.live {
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--accent-dim); }
      50%       { box-shadow: 0 0 0 6px transparent; }
    }

    .container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .badge-count {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .panel-body { padding: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .form-grid input,
    .form-grid select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 9px 14px;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-grid input::placeholder { color: var(--text-muted); }

    .form-grid input:focus,
    .form-grid select:focus {
      border-color: var(--accent);
    }

    .form-grid select option { background: var(--surface2); }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover { opacity: 0.88; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 13px 16px;
      font-size: 13px;
      vertical-align: middle;
    }

    .order-id {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    @keyframes rowFlash {
      0%   { background: #00e5a018; }
      60%  { background: #00e5a010; }
      100% { background: transparent; }
    }
      60%  { background: rgba(14, 165, 233, 0.05); }
      100% { background: transparent; }
    }

    tr.flash { animation: rowFlash 1.4s ease-out forwards; }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .badge.pending   { background: #f0c04018; color: var(--yellow); border: 1px solid #f0c04033; }
    .badge.shipped   { background: #40a0f018; color: var(--blue);   border: 1px solid #40a0f033; }
    .badge.delivered { background: #00e5a018; color: var(--accent); border: 1px solid #00e5a033; }

    .actions { display: flex; gap: 8px; }

    .btn-action {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .btn-action:hover         { border-color: var(--accent); color: var(--accent); }
    .btn-action.del:hover     { border-color: var(--red);    color: var(--red);    }
    .btn-action:active        { transform: scale(0.95); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .log-body {
      background: var(--bg);
      border-radius: 7px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-body::-webkit-scrollbar       { width: 4px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-time { color: var(--text-muted); min-width: 80px; }

    .log-op              { min-width: 60px; font-weight: 600; }
    .log-op.INSERT       { color: var(--accent); }
    .log-op.UPDATE       { color: var(--blue);   }
    .log-op.DELETE       { color: var(--red);    }
    .log-op.SYSTEM       { color: var(--yellow); }

    .log-msg { color: var(--text); }

    .log-empty { color: var(--text-muted); font-style: italic; }

    .ts { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">APT <span>/</span> Order Monitor</div>
  <div class="header-right">
    <span class="ws-status" id="wsLabel">DISCONNECTED</span>
    <div class="dot" id="wsDot"></div>
  </div>
</header>

<div class="container">

  <!-- Create Order -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">New Order</span>
    </div>
    <div class="panel-body">
      <div class="form-grid">
        <input type="text" id="customerName" placeholder="Customer name"/>
        <input type="text" id="productName"  placeholder="Product name"/>
        <select id="orderStatus">
          <option value="pending">Pending</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
        </select>
        <button class="btn btn-primary" onclick="createOrder()">+ Add Order</button>
      </div>
    </div>
  </div>

  <!-- Live Orders Table -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Live Orders</span>
      <span class="badge-count" id="orderCount">0 orders</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Status</th>
            <th>Updated At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="6"><div class="empty-state">Loading orders...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Event Log -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Real-Time Event Log</span>
      <button class="btn-action" onclick="clearLog()" style="font-size:10px;padding:3px 10px;">Clear</button>
    </div>
    <div class="panel-body" style="padding: 12px;">
      <div class="log-body" id="logBody">
        <div class="log-empty">Waiting for database events...</div>
      </div>
    </div>
  </div>

</div>

<script>
  const API    = '/api/orders';
  const WS_URL = `ws://${location.host}`;
  let orders   = [];
  let ws       = null;
  let logEntries = [];

  function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setWSStatus(true);
      logEvent('SYSTEM', 'WebSocket connected — streaming DB events');
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'connected') return; // handshake, ignore
        if (msg.type === 'order_update') {
          applyUpdate(msg.operation, msg.data);
          logEvent(msg.operation, formatLogMessage(msg.operation, msg.data));
        }
      } catch (err) {
        console.error('[WS] Failed to parse message:', err);
      }
    };

    ws.onclose = () => {
      setWSStatus(false);
      logEvent('SYSTEM', 'Disconnected — reconnecting in 3s...');
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
    };
  }

  function setWSStatus(connected) {
    document.getElementById('wsDot').className   = 'dot' + (connected ? ' live' : '');
    document.getElementById('wsLabel').textContent = connected ? 'LIVE' : 'DISCONNECTED';
  }

  function applyUpdate(operation, data) {
    if (operation === 'INSERT') {
      orders.unshift(data);
    } else if (operation === 'UPDATE') {
      const idx = orders.findIndex(o => o.id === data.id);
      if (idx !== -1) orders[idx] = data;
      else orders.unshift(data);
    } else if (operation === 'DELETE') {
      orders = orders.filter(o => o.id !== data.id);
    }
    renderOrders();
    if (operation !== 'DELETE') flashRow(data.id);
  }

  function renderOrders() {
    const tbody = document.getElementById('ordersBody');
    document.getElementById('orderCount').textContent =
      `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

    if (orders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No orders yet. Create one above.</div></td></tr>`;
      return;
    }

    tbody.innerHTML = orders.map(o => `
      <tr id="row-${o.id}">
        <td><span class="order-id">#${o.id}</span></td>
        <td>${escHtml(o.customer_name)}</td>
        <td>${escHtml(o.product_name)}</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
        <td><span class="ts">${formatTime(o.updated_at)}</span></td>
        <td>
          <div class="actions">
            <button class="btn-action" onclick="advanceStatus(${o.id}, '${o.status}')">Advance</button>
            <button class="btn-action del" onclick="deleteOrder(${o.id})">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function flashRow(id) {
    setTimeout(() => {
      const row = document.getElementById(`row-${id}`);
      if (!row) return;
      row.classList.remove('flash');
      void row.offsetWidth; // force reflow to restart animation
      row.classList.add('flash');
    }, 30);
  }

  function logEvent(operation, message) {
    const logBody = document.getElementById('logBody');
    const time    = new Date().toLocaleTimeString('en-IN', { hour12: false });

    const placeholder = logBody.querySelector('.log-empty');
    if (placeholder) placeholder.remove();

    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-op ${operation}">${operation}</span>
      <span class="log-msg">${escHtml(message)}</span>
    `;
    logBody.prepend(entry);

    while (logBody.children.length > 100) {
      logBody.removeChild(logBody.lastChild);
    }
  }

  function clearLog() {
    document.getElementById('logBody').innerHTML =
      '<div class="log-empty">Log cleared.</div>';
  }

  function formatLogMessage(op, data) {
    if (op === 'INSERT') return `New order #${data.id} — ${data.customer_name} — "${data.product_name}" [${data.status}]`;
    if (op === 'UPDATE') return `Order #${data.id} updated — ${data.customer_name} → ${data.status}`;
    if (op === 'DELETE') return `Order #${data.id} deleted — ${data.customer_name}`;
    return JSON.stringify(data);
  }

  async function createOrder() {
    const customer_name = document.getElementById('customerName').value.trim();
    const product_name  = document.getElementById('productName').value.trim();
    const status        = document.getElementById('orderStatus').value;

    if (!customer_name) { alert('Customer name is required'); return; }
    if (!product_name)  { alert('Product name is required');  return; }

    try {
      const res = await fetch(API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ customer_name, product_name, status }),
      });
      if (!res.ok) {
        const err = await res.json();
        alert(`Error: ${err.error}`);
        return;
      }
      document.getElementById('customerName').value = '';
      document.getElementById('productName').value  = '';
    } catch (err) {
      alert('Network error. Is the server running?');
    }
  }

  const STATUS_CYCLE = { pending: 'shipped', shipped: 'delivered', delivered: 'pending' };

  async function advanceStatus(id, currentStatus) {
    const nextStatus = STATUS_CYCLE[currentStatus];
    try {
      await fetch(`${API}/${id}`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ status: nextStatus }),
      });
    } catch (err) {
      alert('Network error. Is the server running?');
    }
  }

  async function deleteOrder(id) {
    if (!confirm(`Delete order #${id}? This cannot be undone.`)) return;
    try {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
    } catch (err) {
      alert('Network error. Is the server running?');
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
    });
  }

  async function init() {
    try {
      const res  = await fetch(API);
      const json = await res.json();
      orders = json.data || [];
      renderOrders();
    } catch (err) {
      console.error('Failed to load initial orders:', err);
    }
    connectWS();
  }

  init();
</script>
</body>
</html>
